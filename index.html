<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Security Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>🔐 Security AI</h2>
    <nav>
      <a href="#">🏠 Home</a>
      <a href="#">📊 Analytics</a>
      <a href="#">🎥 Cameras</a>
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">
      <h1>Security Command Center</h1>
      <span class="live">● LIVE</span>
    </header>

    <section class="stats">
      <div>📷 Cameras <b>3</b></div>
      <div>👤 Entries <b id="entry">0</b></div>
      <div>🚪 Exits <b id="exit">0</b></div>
      <div>⚠️ Unknown <b id="unknown">0</b></div>
    </section>

    <section class="cameras">
      <div class="cam">Front Door</div>
      <div class="cam">Parking</div>
      <div class="cam">Office</div>
    </section>

    <section class="grid">
      <div class="card">
        <h3>🏠 Home Security</h3>
        <div id="home"></div>
      </div>

      <div class="card">
        <h3>🛡 Threat Detection</h3>
        <div id="threat"></div>
      </div>

      <div class="card">
        <h3>🚗 Dashcam</h3>
        <div id="dash"></div>
      </div>

      <div class="card">
        <h3>📦 Assets</h3>
        <div id="asset"></div>
      </div>
    </section>

    <section class="card">
      <h3>📊 Ledger</h3>
      <table id="ledger"><tbody></tbody></table>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
