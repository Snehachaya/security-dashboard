<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Security Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <h2>🔐 SecureAI</h2>
    <ul>
      <li class="active">Dashboard</li>
      <li>Reports</li>
      <li>Settings</li>
    </ul>
  </aside>

  <div class="main">

    <header class="topbar">
      <h1>Security Dashboard</h1>
      <span class="live">● Live</span>
    </header>

    <div class="stats">
      <div class="stat-card"><p>Cameras</p><h2 id="camCount">3</h2></div>
      <div class="stat-card green"><p>Entries</p><h2 id="totalEntry">0</h2></div>
      <div class="stat-card blue"><p>Exits</p><h2 id="totalExit">0</h2></div>
      <div class="stat-card red"><p>Unknown</p><h2 id="unknownCount">0</h2></div>
    </div>

    <div class="grid">
      <div class="card full">
        <h3>📷 Cameras</h3>
        <div class="camera-grid">
          <div class="cam">Front</div>
          <div class="cam">Parking</div>
          <div class="cam">Office</div>
        </div>
      </div>

      <div class="card"><h3>🏠 Security</h3><div id="homeSecurity"></div></div>
      <div class="card"><h3>🛡 Threats</h3><div id="threats"></div></div>
      <div class="card"><h3>🚗 Road</h3><div id="dashcam"></div></div>
      <div class="card"><h3>🧠 Analytics</h3><div id="entryExit"></div></div>
      <div class="card"><h3>📦 Assets</h3><div id="assets"></div></div>

      <div class="card full">
        <h3>📊 Activity Log</h3>
        <table id="ledger">
          <thead>
            <tr><th>Time</th><th>Type</th><th>Source</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
